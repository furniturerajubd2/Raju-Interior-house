<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raju Interior House Manager</title>

<style>
:root{
  --bg:#07110c;
  --panel:rgba(13,24,19,.72);
  --gold:#f97316;
  --green:#4ade80;
  --text:#edf7ef;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  padding:15px 20px;
  background:#0b1712;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand h1{
  margin:0;
  color:var(--green);
}

.container{
  padding:20px;
}

.card{
  background:var(--panel);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

button{
  background:linear-gradient(135deg,#1f8f4e,#f97316);
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
  margin-top:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #333;
  text-align:left;
}

th{
  color:var(--green);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <h1>Raju Interior House</h1>
  </div>

  <button>Dashboard</button>
</div>

<div class="container">

  <div class="card">
    <h2>Add Customer</h2>

    <input type="text" placeholder="Customer Name">
    <input type="text" placeholder="Phone Number">
    <textarea placeholder="Address"></textarea>

    <button>Add Customer</button>
  </div>

  <div class="card">
    <h2>Customer List</h2>

    <table>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Address</th>
      </tr>

      <tr>
        <td>Rahim</td>
        <td>01700000000</td>
        <td>Dhaka</td>
      </tr>

      <tr>
        <td>Karim</td>
        <td>01800000000</td>
        <td>Gulshan</td>
      </tr>
    </table>
  </div>

</div>

</body>
</html>
