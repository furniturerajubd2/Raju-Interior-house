<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raju Interior House Manager</title>
<style>
:root{--bg:#07110c;--panel:rgba(13,24,19,.72);--panel2:rgba(18,31,24,.62);--gold:#f97316;--gold2:#4ade80;--text:#edf7ef;--muted:#9fb5a8;--danger:#ef4444;--border:rgba(74,222,128,.14);--glass:blur(18px);--shadow:0 20px 50px rgba(0,0,0,.28)}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(249,115,22,.18),transparent 22%),radial-gradient(circle at top right,rgba(74,222,128,.14),transparent 24%),linear-gradient(180deg,#06100b,#0b1712 42%,#07110c);color:var(--text)}
.topbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,19,15,.68);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border-bottom:1px solid rgba(74,222,128,.12);box-shadow:0 10px 30px rgba(0,0,0,.22);position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:12px} .brand img{width:52px;height:52px;object-fit:contain;border-radius:14px;background:rgba(255,255,255,.92);padding:4px;border:1px solid rgba(74,222,128,.16);box-shadow:0 10px 20px rgba(0,0,0,.18)}
.brand h1{margin:0;font-size:20px;color:var(--gold2)} .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}
.headerActions{display:flex;align-items:center;gap:10px}
.headerLeft{display:flex;align-items:center;gap:12px}
.subnav{padding:14px 18px 0}
.menuLauncher{max-width:1400px;margin:0 auto;padding:18px 18px 20px;border:1px solid rgba(74,222,128,.10);border-radius:28px;background:linear-gradient(180deg,rgba(11,26,18,.88),rgba(9,18,14,.80));backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);box-shadow:0 20px 44px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.03);position:relative;overflow:hidden}
.menuLauncher::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(249,115,22,.10),transparent 28%),radial-gradient(circle at top left,rgba(74,222,128,.08),transparent 28%);pointer-events:none}
.menuLauncherHead{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.menuLauncherHead h2{margin:0;font-size:22px;color:#f4fbf6}
.menuLauncherBadge{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;background:rgba(31,143,78,.16);border:1px solid rgba(74,222,128,.16);color:#d8f5df;font-size:13px;font-weight:700}
.menuLauncherGrid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:14px}
.menuCard{margin:0;padding:18px;border-radius:22px;text-align:left;background:rgba(8,20,14,.78);border:1px solid rgba(74,222,128,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:flex-start;gap:12px;min-height:138px}
.menuCard.active{border-color:rgba(74,222,128,.34);box-shadow:0 0 0 2px rgba(31,143,78,.16),0 20px 40px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.04)}
.menuCardIcon{width:56px;height:56px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(74,222,128,.14),rgba(249,115,22,.10));border:1px solid rgba(74,222,128,.12);color:#ebfff1;font-size:24px;line-height:1}
.menuCardTitle{display:block;font-size:16px;font-weight:800;color:#f6fff8}
.menuCardMeta{display:block;font-size:12px;line-height:1.45;color:var(--muted)}
.menuCardMeta strong{display:block;color:#d7e6dc;font-size:13px;margin-bottom:2px}
.menuWrap{position:relative}
.menuToggle{width:46px;height:46px;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:0 11px;background:rgba(255,255,255,.08);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid rgba(74,222,128,.12);border-radius:14px;margin:0;box-shadow:0 10px 22px rgba(0,0,0,.16)}
.menuToggle span{display:block;height:2px;background:var(--gold2);border-radius:999px}
.headerMenu{position:absolute;left:0;top:56px;width:220px;padding:10px;background:linear-gradient(180deg,var(--panel),var(--panel2));backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.28)}
.headerMenu .menuBtn{margin:0 0 8px}
.headerMenu .menuBtn:last-child{margin-bottom:0}
.wrap{max-width:1400px;margin:0 auto;padding:18px} .login{max-width:440px;margin:54px auto;background:linear-gradient(180deg,var(--panel),var(--panel2));backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);padding:24px;border-radius:22px;border:1px solid var(--border);box-shadow:var(--shadow)}
.layout{display:grid;grid-template-columns:280px 1fr;gap:18px} @media (max-width:980px){.layout{grid-template-columns:1fr}}
.sidebar{background:linear-gradient(180deg,var(--panel),var(--panel2));backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:22px;padding:16px;height:fit-content;position:sticky;top:88px;box-shadow:var(--shadow)}
.content{min-width:0}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:22px;padding:16px;box-shadow:var(--shadow)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
.span-5{grid-column:span 5} .span-7{grid-column:span 7} .span-12{grid-column:span 12}
@media (max-width:980px){.span-5,.span-7,.span-12{grid-column:span 12}}
h2,h3{margin:0 0 12px;color:var(--gold2)} label{display:block;margin:10px 0 6px;font-size:14px;color:#c8d8cf}
input,textarea,button{width:100%;border-radius:12px;border:1px solid rgba(74,222,128,.12);background:rgba(255,255,255,.08);color:var(--text);padding:12px 14px;font-size:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
textarea{min-height:90px;resize:vertical} button{cursor:pointer;background:linear-gradient(135deg,#1f8f4e,#f97316);color:#fff;font-weight:700;border:none;margin-top:12px;box-shadow:0 12px 24px rgba(31,143,78,.18)}
button.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(74,222,128,.12);box-shadow:none} button.danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff} button.small{width:auto;margin:0;padding:9px 12px;border-radius:10px;font-size:12px}
.row{display:flex;gap:12px;flex-wrap:wrap} .row>*{flex:1;min-width:150px}
.menuBtn{text-align:left;margin:8px 0;background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(74,222,128,.10)} .menuBtn.active{background:linear-gradient(135deg,#1f8f4e,#f97316);color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px} @media (max-width:980px){.stats{grid-template-columns:1fr 1fr}}
.stat{background:rgba(255,255,255,.07);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow)} .stat .v{font-size:26px;font-weight:800;color:var(--gold2);margin-top:6px}
.small{font-size:12px;color:var(--muted)} table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
th,td{border-bottom:1px solid rgba(255,255,255,.08);padding:10px 8px;text-align:left;vertical-align:top} th{color:var(--gold2)}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px} .actions{display:flex;gap:8px;flex-wrap:wrap} .hide{display:none!important}
.pill{display:inline-block;background:rgba(74,222,128,.10);color:var(--gold2);border:1px solid rgba(74,222,128,.14);padding:6px 10px;border-radius:999px;font-size:12px}
.note{margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-size:12px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.modalBg{position:fixed;inset:0;background:rgba(2,6,23,.56);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
.modal{width:min(860px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,var(--panel),var(--panel2));backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 24px 50px rgba(31,41,55,.18)}
.kv{display:grid;grid-template-columns:180px 1fr;gap:10px;margin:8px 0} @media (max-width:760px){.kv{grid-template-columns:1fr}}
.invoiceShell{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;align-items:start}
.invoiceShell.recentHidden{grid-template-columns:minmax(0,1fr)}
.invoiceMain{min-width:0}
.recentDock{padding:14px}
.recentDockHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.recentCompact{display:grid;gap:10px}
.recentItem{border:1px solid rgba(74,222,128,.10);border-radius:16px;background:rgba(255,255,255,.06);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);overflow:hidden;box-shadow:0 12px 26px rgba(0,0,0,.18)}
.recentSummary{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.recentSl{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(31,143,78,.14),rgba(249,115,22,.14));display:flex;align-items:center;justify-content:center;color:var(--gold2);font-weight:800;font-size:12px}
.recentName{font-weight:700}
.recentArrow{font-size:18px;color:var(--gold2)}
.recentMeta{padding:0 12px 12px;color:var(--muted);font-size:12px}
.recentMeta .actions{margin-top:10px}
.recentMeta p{margin:0 0 6px}
.dashList{display:grid;gap:10px;margin-top:10px}
.dashListHead,.dashSummary{display:grid;grid-template-columns:80px minmax(140px,1.2fr) minmax(120px,1fr) minmax(120px,1fr) 70px;gap:10px;align-items:center}
.dashListHead{padding:0 12px 6px;color:var(--gold2);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.dashCustomer{border:1px solid rgba(74,222,128,.10);border-radius:16px;background:rgba(255,255,255,.06);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);overflow:hidden;box-shadow:0 12px 26px rgba(0,0,0,.18)}
.dashSummary{padding:12px;cursor:pointer}
.dashCell{font-size:13px}
.dashCell strong{color:var(--text)}
.dashExpand{padding:0 12px 12px;border-top:1px solid rgba(31,143,78,.12)}
.dashGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
.dashStat{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(74,222,128,.10)}
.dashStat .small{display:block;margin-bottom:4px}
.receiptHistory{margin-top:14px;padding:12px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(74,222,128,.10)}
.receiptHistory h3{margin:0 0 10px;font-size:14px}
.receiptHistoryItem{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
.receiptHistoryItem:last-child{border-bottom:none;padding-bottom:0}
.receiptHistoryItem:first-of-type{padding-top:0}
.dashActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.statusFilters{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
@media (max-width:980px){
  .dashListHead{display:none}
  .dashSummary{grid-template-columns:1fr auto}
  .dashCell[data-label]::before{content:attr(data-label) ": ";display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  .dashGrid{grid-template-columns:1fr 1fr}
}
@media (max-width:1180px){.menuLauncherGrid{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media (max-width:980px){.invoiceShell,.invoiceShell.recentHidden{grid-template-columns:1fr}.headerMenu{left:0}.subnav{padding:10px 12px 0}.menuLauncher{padding:16px}.menuLauncherGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.menuCard{min-height:128px;padding:16px}}
@media (max-width:620px){.menuLauncherHead{flex-direction:column;align-items:flex-start}.menuLauncherGrid{grid-template-columns:1fr}.menuCard{min-height:auto}}
.green{color:#7edc81} .red{color:#ff9e9e}
</style>

async function pushCloudBackup() {
  if(!supabaseClient) return;
  try {
    setCloudSyncStatus("Cloud backup syncing...", currentPage === "settings");
    const payload = JSON.parse(JSON.stringify(DB));
    const { error } = await supabaseClient
      .from("app_backups")
      .upsert({
        app_key: CLOUD_BACKUP_KEY,
        payload: payload,
        updated_at: new Date().toISOString()
      }, { onConflict: "app_key" });
    if(error) throw error;
    setCloudSyncStatus("Cloud backup synced", currentPage === "settings");
  } catch (error) {
    console.error("Cloud backup failed", error);
    setCloudSyncStatus("Cloud backup failed", currentPage === "settings");
  }
}
function queueCloudBackup() {
  if(!supabaseClient) return;
  if(cloudSyncTimer) clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(function() {
    pushCloudBackup();
  }, 600);
}
function normalizeLoadedDB(data) {
  const next = data || freshDB();
  next.settings = Object.assign({}, DEFAULTS, next.settings || {});
  next.challans = Array.isArray(next.challans) ? next.challans : [];
  next.sales = Array.isArray(next.sales) ? next.sales : [];
  next.receipts = Array.isArray(next.receipts) ? next.receipts : [];
  next.expenses = Array.isArray(next.expenses) ? next.expenses : [];
  next.supplierProjects = Array.isArray(next.supplierProjects) ? next.supplierProjects : [];
  return next;
}
async function restoreCloudBackup() {
  if(!supabaseClient) return;
  try {
    setCloudSyncStatus("Checking cloud backup...", false);
    const { data, error } = await supabaseClient
      .from("app_backups")
      .select("payload, updated_at")
      .eq("app_key", CLOUD_BACKUP_KEY)
      .maybeSingle();
    if(error) throw error;
    if(data && data.payload) {
      DB = normalizeLoadedDB(data.payload);
      localStorage.setItem(KEY, JSON.stringify(DB));
      currentPage = (DB.settings && DB.settings.defaultPage) || "invoice";
      setCloudSyncStatus("Cloud backup restored", false);
      render();
      return;
    }
    setCloudSyncStatus("No cloud backup yet", false);
  } catch (error) {
    console.error("Cloud restore failed", error);
    setCloudSyncStatus("Cloud restore failed", false);
  }
}

function saveSale() {
  const items = collectInvoiceItems();
  const total = invoiceItemsTotal(items);
  const id = editSaleId || makeDocId(DB.settings.invoicePrefix || "INV", DB.sales);
  const obj = {
    id:id, date: document.getElementById("saleDate").value || today(), customer: document.getElementById("custName").value,
    customerId: id,
    phone: document.getElementById("custPhone").value,
    address: document.getElementById("custAddress").value,
    deliveryDate: document.getElementById("saleDeliveryDate").value,
    product: items[0] ? items[0].description : "", qty: items[0] ? Number(items[0].qty || 0) : 0,
    unitPrice: 0, total: total,
    cost: 0,
    advance: Number(document.getElementById("paidAmount").value || 0),
    paid: Number(document.getElementById("paidAmount").value || 0),
    orderStatus: (editSaleId && (DB.sales.find(function(x){ return x.id===editSaleId; }) || {}).orderStatus) || "On Going",
    discountEnabled: !!document.getElementById("saleDiscountToggle").checked,
    discount: document.getElementById("saleDiscountToggle").checked ? Number(document.getElementById("saleDiscount").value || 0) : 0,
    notes: document.getElementById("saleNotes").value, items: items
  };
  obj.due = Math.max(0, obj.total - obj.discount - obj.advance);
  if(editSaleId) DB.sales = DB.sales.map(x => x.id===id ? obj : x); else DB.sales.unshift(obj);
  editSaleId = null; saveDB();
}

function challanTotals(obj) {
  const items = Array.isArray(obj.items) ? obj.items : normalizeChallanItems(obj);
  const subtotal = challanItemsTotal(items);
  const transport = Number(obj.transport || 0);
  return { subtotal: subtotal, total: subtotal + transport };
}
function applySaleToChallanForm(sale) {
  if(!sale) return;
  const customer = document.getElementById("chlCustomer");
  const mobile = document.getElementById("chlMobile");
  const address = document.getElementById("chlAddress");
  if(customer) customer.value = sale.customer || "";
  if(mobile) mobile.value = sale.phone || "";
  if(address) address.value = sale.address || "";
}
function syncChallanInvoiceRef() {
  const invoiceInput = document.getElementById("chlInvoiceId");
  const hint = document.getElementById("chlInvoiceHint");
  if(!invoiceInput) return;
  const sale = findSaleByRef((invoiceInput.value || "").trim());
  if(sale) {
    applySaleToChallanForm(sale);
    if(hint) hint.innerHTML = 'Bound to customer ID <strong>' + esc(sale.customerId || sale.id) + '</strong>';
  } else if(hint) {
    hint.textContent = invoiceInput.value ? "Invoice ID or phone number not found." : "Invoice ID or phone number diye customer data link hobe.";
  }
}
function deleteChallan(id) {
  if(confirm("Delete this challan entry?")) {
    DB.challans = DB.challans.filter(function(x) { return x.id !== id; });
    saveDB();
  }
}
function applySaleToReceiptForm(sale) {
  if(!sale) return;
  const customer = document.getElementById("rcName");
  if(customer) customer.value = sale.customer || "";
}
function updateReceiptPreview() {
  const refInput = document.getElementById("rcInvoiceId");
  const dueInput = document.getElementById("rcDueAmount");
  const paidInput = document.getElementById("rcPaidTotal");
  const amountInput = document.getElementById("rcAmount");
  const sale = findSaleByRef((refInput && refInput.value) || "");
  if(!sale) {
    if(dueInput) dueInput.value = 0;
    if(paidInput) paidInput.value = 0;
    return;
  }
  const enteredAmount = Number((amountInput && amountInput.value) || 0);
  const currentPaid = salePaidTotal(sale);
  const currentDue = saleDueAmount(sale);
  if(paidInput) paidInput.value = currentPaid + enteredAmount;
  if(dueInput) dueInput.value = Math.max(0, currentDue - enteredAmount);
}
function syncReceiptInvoiceRef() {
  const invoiceInput = document.getElementById("rcInvoiceId");
  const hint = document.getElementById("rcInvoiceHint");
  const dueInput = document.getElementById("rcDueAmount");
  const paidInput = document.getElementById("rcPaidTotal");
  if(!invoiceInput) return;
  const sale = findSaleByRef((invoiceInput.value || "").trim());
  if(sale) {
    applySaleToReceiptForm(sale);
    if(hint) hint.innerHTML = 'Bound to customer ID <strong>' + esc(sale.customerId || sale.id) + '</strong>';
    updateReceiptPreview();
  } else if(hint) {
    hint.textContent = invoiceInput.value ? "Invoice ID or phone number not found." : "Invoice ID or phone number diye payment bind hobe.";
    if(dueInput) dueInput.value = 0;
    if(paidInput) paidInput.value = 0;
  }
}

function saveChallan() {
  const items = collectChallanItems();
  const invoiceId = (document.getElementById("chlInvoiceId").value || "").trim();
  const linkedSale = findSaleByRef(invoiceId);
  if(!invoiceId || !linkedSale) { alert("Valid Invoice ID or phone number dite hobe."); return; }
  const id = editChallanId || makeDocId(DB.settings.challanPrefix || "CHL", DB.challans);
  const obj = {
    id: id,
    invoiceId: invoiceId,
    customerId: linkedSale.customerId || linkedSale.id,
    date: document.getElementById("chlDate").value || today(),
    customer: document.getElementById("chlCustomer").value,
    mobile: document.getElementById("chlMobile").value,
    address: document.getElementById("chlAddress").value,
    item: items[0] ? items[0].description : "",
    qty: items[0] ? Number(items[0].qty || 0) : 0,
    unitPrice: 0,
    discount: 0,
    transport: Number(document.getElementById("chlTransport").value || 0),
    notes: document.getElementById("chlNotes").value,
    items: items
  };
  const totals = challanTotals(obj);
  obj.subtotal = totals.subtotal;
  obj.total = totals.total;
  if(editChallanId) DB.challans = DB.challans.map(x => x.id===id ? obj : x); else DB.challans.unshift(obj);
  editChallanId = null; saveDB();
}
function fillChallan(id) {
  const c = DB.challans.find(x=>x.id===id); if(!c) return;
  editChallanId = id; setPage("challan");
  setTimeout(function() {
    document.getElementById("chlInvoiceId").value = c.invoiceId || "";
    document.getElementById("chlDate").value = c.date || today();
    document.getElementById("chlCustomer").value = c.customer || "";
    document.getElementById("chlMobile").value = c.mobile || "";
    document.getElementById("chlAddress").value = c.address || "";
    document.getElementById("chlTransport").value = c.transport || 0;
    document.getElementById("chlGrandTotal").value = c.total || 0;
    document.getElementById("chlNotes").value = c.notes || "";
    setChallanItems(normalizeChallanItems(c));
    syncChallanInvoiceRef();
  }, 50);
}
function openChallan(id) {
  const c = DB.challans.find(x=>x.id===id); if(!c) return;
  const itemRows = normalizeChallanItems(c).map(function(item, idx) {
    return '<tr><td>'+String(idx+1).padStart(2,"0")+'</td><td>'+esc(item.description)+'</td><td>'+esc(item.qty)+'</td><td>'+money(item.total)+'</td></tr>';

  let html = '<div class="section-title"><h2>Challan Entry</h2><div class="actions"><button class="secondary small" onclick="printChallanEntry(\''+id+'\')">Print</button><button class="secondary small" onclick="closeModal()">Close</button></div></div>';

function printChallanEntry(id) {
  const c = DB.challans.find(x=>x.id===id); if(!c) return;
  const w = window.open("", "_blank");
  const logoSrc = DB.settings.showLogo && (DB.settings.logo || DEFAULTS.logo) ? (DB.settings.logo || DEFAULTS.logo) : "";
  const items = normalizeChallanItems(c);
  const itemRows = items.map(function(item, idx) {

  }).join("");
  const html = `<!DOCTYPE html>
<html lang="en">

function saveReceipt() {
  const invoiceId = (document.getElementById("rcInvoiceId").value || "").trim();
  const linkedSale = findSaleByRef(invoiceId);
  if(!invoiceId || !linkedSale) { alert("Valid Invoice ID or phone number dite hobe."); return; }
  const id = editReceiptId || makeDocId(DB.settings.receiptPrefix || "MR", DB.receipts);
  const obj = { id:id, invoiceId: invoiceId, customerId: linkedSale.customerId || linkedSale.id, date: document.getElementById("rcDate").value || today(), customer: document.getElementById("rcName").value, amount: Number(document.getElementById("rcAmount").value || 0), purpose: document.getElementById("rcPurpose").value, notes: document.getElementById("rcNotes").value };
  if(editReceiptId) DB.receipts = DB.receipts.map(x => x.id===id ? obj : x); else DB.receipts.unshift(obj);
  editReceiptId = null; saveDB();
}
function fillReceipt(id) {
  const r = DB.receipts.find(x=>x.id===id); if(!r) return;
  editReceiptId = id; setPage("receipt");
  setTimeout(function() {
    document.getElementById("rcInvoiceId").value = r.invoiceId || "";
    document.getElementById("rcDate").value = r.date || today();
    document.getElementById("rcName").value = r.customer || "";
    document.getElementById("rcAmount").value = r.amount || 0;
    document.getElementById("rcPurpose").value = r.purpose || "";
    document.getElementById("rcNotes").value = r.notes || "";
    syncReceiptInvoiceRef();
  }, 50);
}
function openReceipt(id) {
  const r = DB.receipts.find(x=>x.id===id); if(!r) return;
  let html = '<div class="section-title"><h2>Money Receipt</h2><div class="actions"><button class="secondary small" onclick="printReceiptEntry(\''+id+'\')">Print</button><button class="secondary small" onclick="closeModal()">Close</button></div></div>';
  html += '<div class="kv"><strong>Receipt ID</strong><div>'+esc(r.id)+'</div></div><div class="kv"><strong>Invoice ID</strong><div>'+esc(r.invoiceId || "-")+'</div></div><div class="kv"><strong>Customer ID</strong><div>'+esc(r.customerId || r.invoiceId || "-")+'</div></div><div class="kv"><strong>Date</strong><div>'+esc(r.date)+'</div></div><div class="kv"><strong>Customer</strong><div>'+esc(r.customer)+'</div></div><div class="kv"><strong>Amount</strong><div>'+money(r.amount)+'</div></div><div class="kv"><strong>Purpose</strong><div>'+esc(r.purpose)+'</div></div><div class="kv"><strong>Notes</strong><div>'+esc(r.notes || "-")+'</div></div>';
  openModal(html);
}

function saveExpense() {
  const id = editExpenseId || uid("EXP");
  const old = editExpenseId ? DB.expenses.find(x=>x.id===id) : null;
  const obj = { id:id, date: document.getElementById("expDate").value || today(), head: document.getElementById("expHead").value, amount: Number(document.getElementById("expAmount").value || 0), notes: document.getElementById("expNotes").value, orderStatus: (old && old.orderStatus) || "On Going" };
  if(editExpenseId) DB.expenses = DB.expenses.map(x => x.id===id ? obj : x); else DB.expenses.unshift(obj);
  editExpenseId = null; saveDB();
}
function fillExpense(id) {
  const e = DB.expenses.find(x=>x.id===id); if(!e) return;
  editExpenseId = id; setPage("expense");
  setTimeout(function() {
    document.getElementById("expDate").value = e.date || today();
    document.getElementById("expHead").value = e.head || "";
    document.getElementById("expAmount").value = e.amount || 0;
    document.getElementById("expNotes").value = e.notes || "";
  }, 50);
}
function openExpense(id) {
  const e = DB.expenses.find(x=>x.id===id); if(!e) return;
  let html = '<div class="section-title"><h2>Expense Entry</h2><div class="actions"><button class="secondary small" onclick="printExpenseEntry(\''+id+'\')">Print</button><button class="secondary small" onclick="closeModal()">Close</button></div></div>';
  html += '<div class="kv"><strong>ID</strong><div>'+esc(e.id)+'</div></div><div class="kv"><strong>Date</strong><div>'+esc(e.date)+'</div></div><div class="kv"><strong>Head</strong><div>'+esc(e.head)+'</div></div><div class="kv"><strong>Amount</strong><div>'+money(e.amount)+'</div></div><div class="kv"><strong>Notes</strong><div>'+esc(e.notes || "-")+'</div></div>';
  openModal(html);
}
function printExpenseEntry(id) {
  const e = DB.expenses.find(x=>x.id===id); if(!e) return;
  let body = brandHead();
  body += '<h1>EXPENSE ENTRY</h1><p><strong>ID:</strong> '+esc(e.id)+'</p><p><strong>Date:</strong> '+esc(e.date)+'</p><p><strong>Head:</strong> '+esc(e.head)+'</p><p><strong>Amount:</strong> '+money(e.amount)+'</p><p><strong>Notes:</strong> '+esc(e.notes || "-")+'</p>';
  printHTML("Expense", body);
}

  const old = editSupplierId ? DB.supplierProjects.find(x=>x.id===id) : null;
  const items = collectSupplierItems();
  const autoTotal = !!((document.getElementById("supAutoTotal") || {}).checked);
  const obj = {
    id:id, date: document.getElementById("supDate").value || today(), deliveryDate: document.getElementById("supDeliveryDate").value || document.getElementById("supDate").value || today(), project: document.getElementById("supProject").value,
    supplierName: (document.getElementById("supName").value || "").trim(),
    details: items[0] ? items[0].description : "",
    totalAmount: Number(document.getElementById("supTotal").value || 0),
    advanceAmount: Number(document.getElementById("supAdvance").value || 0),
    orderStatus: (old && old.orderStatus) || "On Going",
    autoTotal: autoTotal,
    notes: document.getElementById("supNotes").value, payments: old ? (old.payments || []) : [],
    items: items
  };
  if(editSupplierId) DB.supplierProjects = DB.supplierProjects.map(x => x.id===id ? obj : x); else DB.supplierProjects.unshift(obj);

  const formCard = '<div class="card invoiceMain"><div class="section-title"><h2>Money Receipt</h2><div class="actions"><button class="secondary small" onclick="toggleRecentPanel(\'receipt\')">'+(recentVisible ? 'Hide Recent' : 'Show Recent')+'</button></div></div><label>User ID</label><input id="rcInvoiceId" placeholder="Invoice ID or phone number" oninput="syncReceiptInvoiceRef()"><div id="rcInvoiceHint" class="small" style="margin-top:6px">Invoice ID or phone number diye payment bind hobe.</div><label>Date</label><input id="rcDate" type="date" value="'+today()+'"><label>Customer Name</label><input id="rcName" placeholder="Customer name"><div class="row"><div><label>Current Due Amount</label><input id="rcDueAmount" type="number" value="0" readonly></div><div><label>Total Paid</label><input id="rcPaidTotal" type="number" value="0" readonly></div></div><label>Received Amount</label><input id="rcAmount" type="number" value="0" oninput="updateReceiptPreview()"><label>Purpose</label><input id="rcPurpose" placeholder="Advance / Full payment"><label>Notes</label><textarea id="rcNotes"></textarea><button onclick="saveReceipt()">'+(editReceiptId?"Update Receipt":"Save Receipt")+'</button></div>';
  return '<div class="invoiceShell '+(recentVisible ? '' : 'recentHidden')+'">' + formCard + (recentVisible ? recentCard : '') + '</div>';
}
function supplierPage() {
  const recentVisible = isRecentVisible("supplier");
  const recentCard = '<div class="card recentDock"><div class="recentDockHead"><div><h2 style="margin-bottom:4px">Supplier List</h2><div class="small">'+DB.supplierProjects.length+' projects</div></div><button class="secondary small" onclick="toggleRecentPanel(\'supplier\')">'+(recentVisible ? 'Hide' : 'Show')+'</button></div>'+recentSupplierListView()+'</div>';
  const formCard = '<div class="card invoiceMain"><div class="section-title"><h2>Supplier Hisab</h2><div class="actions"><button class="secondary small" onclick="toggleRecentPanel(\'supplier\')">'+(recentVisible ? 'Hide Recent' : 'Show Recent')+'</button></div></div><label>Order Date</label><input id="supDate" type="date" value="'+today()+'"><label>Delivery Date</label><input id="supDeliveryDate" type="date" value="'+today()+'"><label>Supplier Name</label><input id="supName" list="supplierNameList" placeholder="Supplier name"><datalist id="supplierNameList">'+supplierNameOptionsHtml()+'</datalist><div class="small" style="margin-top:6px">আগের supplier name type korlei suggest ashbe. Ek supplier-er under onek project alada alada save korte parben.</div><label>Project Name</label><input id="supProject" placeholder="Example: Bed Project - Karim Villa"><label>Item Details</label><table><thead><tr><th>Description</th><th>Qty</th><th>Total</th><th>Action</th></tr></thead><tbody id="supplierItems">'+supplierItemRowHtml({ description: "", qty: 1, total: 0 })+'</tbody></table><button type="button" class="secondary small" onclick="addSupplierItemRow()">+ Add Item</button><div class="row"><div><label>Total Project Amount</label><input id="supTotal" type="number" value="0" readonly></div><div><label>Advance Amount</label><input id="supAdvance" type="number" value="0"></div></div><label style="display:flex;align-items:center;gap:8px"><input id="supAutoTotal" type="checkbox" style="width:auto" checked onchange="toggleSupplierTotalMode()"> Auto Calculate Total</label><div class="small" style="margin-top:6px">Auto off korle total amount nijer moto edit korte parben.</div><label>Notes</label><textarea id="supNotes"></textarea><button onclick="saveSupplier()">'+(editSupplierId?"Update Supplier Project":"Save Supplier Project")+'</button></div>';
  return '<div class="invoiceShell '+(recentVisible ? '' : 'recentHidden')+'">' + formCard + (recentVisible ? recentCard : '') + '</div>';
}
function expensePage() {
  const recentVisible = isRecentVisible("expense");
  const recentCard = '<div class="card recentDock"><div class="recentDockHead"><div><h2 style="margin-bottom:4px">Recent Expense</h2><div class="small">'+DB.expenses.length+' entries</div></div><button class="secondary small" onclick="toggleRecentPanel(\'expense\')">'+(recentVisible ? 'Hide' : 'Show')+'</button></div>'+recentExpenseListView()+'</div>';
  const formCard = '<div class="card invoiceMain"><div class="section-title"><h2>Expense</h2><div class="actions"><button class="secondary small" onclick="toggleRecentPanel(\'expense\')">'+(recentVisible ? 'Hide Recent' : 'Show Recent')+'</button></div></div><label>Date</label><input id="expDate" type="date" value="'+today()+'"><label>Expense Head</label><input id="expHead" placeholder="Transport / Rent / Salary / Tea"><label>Amount</label><input id="expAmount" type="number" value="0"><label>Notes</label><textarea id="expNotes"></textarea><button onclick="saveExpense()">'+(editExpenseId?"Update Expense":"Save Expense")+'</button><div class="note">Supplier payment dashboard e expense hisebe count hocche.</div></div>';
  return '<div class="invoiceShell '+(recentVisible ? '' : 'recentHidden')+'">' + formCard + (recentVisible ? recentCard : '') + '</div>';
}
function dashboardPage() {
  const t = totals();
  let listTitle = "Customer List";
  let listBadge = customerList().length + " customers";
  let listBody = '<label>Search Customer</label><input id="customerSearch" placeholder="Invoice ID or phone number diye search korun" oninput="filterCustomerList(this.value)"><div class="section-title" style="margin-top:12px"><h3 style="margin:0">Order Status</h3><span class="small">Customer list filter</span></div><div class="statusFilters"><button class="secondary small '+(dashboardStatusFilter==="On Going"?"active":"")+'" onclick="setDashboardStatusFilter(\'On Going\')">On Going</button><button class="secondary small '+(dashboardStatusFilter==="Complete"?"active":"")+'" onclick="setDashboardStatusFilter(\'Complete\')">Complete</button><button class="secondary small '+(dashboardStatusFilter==="all"?"active":"")+'" onclick="setDashboardStatusFilter(\'all\')">All</button></div><div class="dashListHead"><div>SL No</div><div>Name</div><div>Number</div><div>Due Amount</div><div>Action</div></div><div id="customerListBody" class="dashList">'+renderCustomerRows("")+'</div>';
  if(dashboardTab === "supplier") {
    listTitle = "Supplier List";
    listBadge = DB.supplierProjects.length + " entries";
    listBody = '<label>Search Supplier</label><input value="'+esc(dashboardSupplierSearch)+'" placeholder="Supplier name, project or ID diye search korun" oninput="setDashboardSupplierSearch(this.value)"><div class="section-title" style="margin-top:12px"><h3 style="margin:0">Order Status</h3><span class="small">Supplier list filter</span></div><div class="statusFilters"><button class="secondary small '+(dashboardSupplierStatusFilter==="On Going"?"active":"")+'" onclick="setDashboardSupplierStatusFilter(\'On Going\')">On Going</button><button class="secondary small '+(dashboardSupplierStatusFilter==="Complete"?"active":"")+'" onclick="setDashboardSupplierStatusFilter(\'Complete\')">Complete</button><button class="secondary small '+(dashboardSupplierStatusFilter==="all"?"active":"")+'" onclick="setDashboardSupplierStatusFilter(\'all\')">All</button></div><div class="dashListHead"><div>SL No</div><div>Supplier</div><div>Project</div><div>Due Amount</div><div>Action</div></div><div class="dashList">'+renderDashboardSupplierRows()+'</div>';
  } else if(dashboardTab === "expense") {
    listTitle = "Expense List";
    listBadge = DB.expenses.length + " entries";
    listBody = '<label>Search Expense</label><input value="'+esc(dashboardExpenseSearch)+'" placeholder="Expense head, date or ID diye search korun" oninput="setDashboardExpenseSearch(this.value)"><div class="section-title" style="margin-top:12px"><h3 style="margin:0">Order Status</h3><span class="small">Expense list filter</span></div><div class="statusFilters"><button class="secondary small '+(dashboardExpenseStatusFilter==="On Going"?"active":"")+'" onclick="setDashboardExpenseStatusFilter(\'On Going\')">On Going</button><button class="secondary small '+(dashboardExpenseStatusFilter==="Complete"?"active":"")+'" onclick="setDashboardExpenseStatusFilter(\'Complete\')">Complete</button><button class="secondary small '+(dashboardExpenseStatusFilter==="all"?"active":"")+'" onclick="setDashboardExpenseStatusFilter(\'all\')">All</button></div><div class="dashListHead"><div>SL No</div><div>Date</div><div>Head</div><div>Amount</div><div>Action</div></div><div class="dashList">'+renderDashboardExpenseRows()+'</div>';
  }
  return '<div class="grid"><div class="card span-12"><div class="section-title"><h2>Dashboard</h2><span class="pill">Hidden Menu Page</span></div><div class="stats"><div class="stat"><div class="small">Total Sale</div><div class="v">'+money(t.totalSale)+'</div></div><div class="stat"><div class="small">General Expense</div><div class="v">'+money(t.generalExpense)+'</div></div><div class="stat"><div class="small">Supplier Expense</div><div class="v">'+money(t.supplierExpense)+'</div></div><div class="stat"><div class="small">Monthly Profit</div><div class="v">'+money(t.monthlyProfit)+'</div></div></div></div><div class="card span-12"><div class="section-title"><div class="actions"><h2 style="margin:0">'+listTitle+'</h2><button class="secondary small '+(dashboardTab==="customer"?"active":"")+'" onclick="setDashboardTab(\'customer\')">Customer List</button><button class="secondary small '+(dashboardTab==="supplier"?"active":"")+'" onclick="setDashboardTab(\'supplier\')">Supplier List</button><button class="secondary small '+(dashboardTab==="expense"?"active":"")+'" onclick="setDashboardTab(\'expense\')">Expense List</button></div><span class="pill">'+listBadge+'</span></div>'+listBody+'</div></div>';
}
function settingsPage() {
  return '<div class="card"><h2>Settings</h2><div class="small" style="margin:-4px 0 14px;color:var(--gold2)">Cloud Backup: '+esc(cloudSyncStatus)+'</div><div class="row"><div><label>Business Name</label><input id="setName" value="'+esc(DB.settings.name)+'"></div><div><label>Phone</label><input id="setPhone" value="'+esc(DB.settings.phone)+'"></div></div><label>Address</label><input id="setAddress" value="'+esc(DB.settings.address)+'"><div class="row"><div><label>Currency</label><input id="setCurrency" value="'+esc(DB.settings.currency || "৳")+'"></div><div><label>Logo URL</label><input id="setLogo" placeholder="Optional online logo url"></div></div><div class="row"><div><label>Invoice Prefix</label><input id="setInvoicePrefix" value="'+esc(DB.settings.invoicePrefix || "INV")+'"></div><div><label>Challan Prefix</label><input id="setChallanPrefix" value="'+esc(DB.settings.challanPrefix || "CHL")+'"></div><div><label>Receipt Prefix</label><input id="setReceiptPrefix" value="'+esc(DB.settings.receiptPrefix || "MR")+'"></div><div><label>Supplier Prefix</label><input id="setSupplierPrefix" value="'+esc(DB.settings.supplierPrefix || "SUP")+'"></div></div><label>Default Open Page</label><input id="setDefaultPage" value="'+esc(DB.settings.defaultPage || "invoice")+'" placeholder="invoice / challan / receipt / supplier / expense / dashboard / settings"><label><input id="setShowLogo" type="checkbox" style="width:auto;margin-right:8px" '+(DB.settings.showLogo?'checked':'')+'> Show Logo in Print</label><div class="actions"><button onclick="saveSettings()">Save Settings</button><button class="secondary small" onclick="pushCloudBackup()">Sync Now</button><button class="secondary small" onclick="exportBackup()">Backup Export</button><button class="secondary small" onclick="document.getElementById(\'backupFile2\').click()">Import</button><input id="backupFile2" type="file" accept=".json" class="hide" onchange="importBackup(event)"><button class="danger small" onclick="resetAll()">Reset App</button></div></div>';
}
function mainView() {
  let content = '';
  if(currentPage === "invoice") content = invoicePage();
  else if(currentPage === "challan") content = challanPage();
  else if(currentPage === "receipt") content = receiptPage();
  else if(currentPage === "supplier") content = supplierPage();
  else if(currentPage === "expense") content = expensePage();
  else if(currentPage === "dashboard") content = dashboardPage();
  else content = settingsPage();

  const launcher = '<div class="subnav"><div class="menuLauncher"><div class="menuLauncherHead"><h2>Main Menu</h2><span class="menuLauncherBadge">Icon Launcher</span></div><div class="menuLauncherGrid">'
    + launcherCard("dashboard","Dashboard","&#8962;","Summary","Quick overview and totals")
    + launcherCard("invoice","Sales","&#128179;",DB.sales.length+' sale entries',"Create and manage invoices")
    + launcherCard("challan","Challan","&#128230;",DB.challans.length+' challan entries',"Delivery and item movement copy")
    + launcherCard("receipt","Receipts","&#129534;",DB.receipts.length+' receipt entries',"Money receipt and payment log")
    + launcherCard("supplier","Supplier","&#128736;",DB.supplierProjects.length+' supplier projects',"Supplier account and dues")
    + launcherCard("expense","Expenses","&#128184;",DB.expenses.length+' expense entries',"Daily expense records")
    + launcherCard("settings","Settings","&#9881;","Business info","Prefixes, logo and defaults")
    + '</div></div></div>';

  return '<div class="topbar"><div class="headerLeft"><div class="menuWrap"><button class="menuToggle" onclick="toggleHeaderMenu()"><span></span><span></span><span></span></button>'+(headerMenuOpen ? '<div class="headerMenu">'+menuButton("invoice","Invoice")+menuButton("challan","Challan")+menuButton("receipt","Money Receipt")+menuButton("supplier","Supplier Hisab")+menuButton("expense","Expense")+menuButton("dashboard","Dashboard")+menuButton("settings","Settings")+'<button class="menuBtn danger" onclick="logout()">Logout</button></div>' : '')+'</div><div class="brand"><img src="'+(DB.settings.logo || DEFAULTS.logo)+'" alt="logo"><div><h1>'+esc(DB.settings.name)+'</h1><p>'+esc(DB.settings.phone)+' · '+esc(DB.settings.address)+'</p></div></div></div><div class="headerActions"><button class="secondary small" onclick="setPage(\'invoice\')">Main Invoice</button></div></div>'+launcher+'<div class="wrap"><div class="content">'+content+'</div></div>';
}
function render() { document.getElementById("app").innerHTML = mainView(); }
render();
restoreCloudBackup();
</script>
